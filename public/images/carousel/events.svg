<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Event card -->
  <rect x="40" y="40" width="120" height="100" rx="8" fill="#F59E0B" />
  <rect x="50" y="60" width="100" height="70" rx="4" fill="#D97706" />
  
  <!-- Event details -->
  <rect x="60" y="70" width="80" height="10" rx="2" fill="#FCD34D" />
  <rect x="60" y="90" width="60" height="10" rx="2" fill="#FCD34D" />
  <rect x="60" y="110" width="40" height="10" rx="2" fill="#FCD34D" />
  
  <!-- Calendar icon -->
  <rect x="140" y="70" width="30" height="30" rx="4" fill="#FBBF24" />
  <rect x="145" y="75" width="20" height="20" rx="2" fill="#F59E0B" />
  <rect x="150" y="80" width="10" height="10" rx="1" fill="#FBBF24" />
  
  <!-- People circles -->
  <circle cx="60" cy="160" r="15" fill="#F472B6" />
  <circle cx="100" cy="160" r="15" fill="#FBBF24" />
  <circle cx="140" cy="160" r="15" fill="#34D399" />
  
  <!-- Connection lines -->
  <line x1="60" y1="145" x2="60" y2="130" stroke="#F472B6" stroke-width="2" />
  <line x1="100" y1="145" x2="100" y2="130" stroke="#FBBF24" stroke-width="2" />
  <line x1="140" y1="145" x2="140" y2="130" stroke="#34D399" stroke-width="2" />
  
  <!-- Notification badges -->
  <circle cx="160" cy="50" r="10" fill="#EF4444" />
  <text x="160" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1</text>
</svg> 