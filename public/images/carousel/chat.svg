<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chat bubbles -->
  <rect x="40" y="60" width="80" height="40" rx="20" fill="#F472B6" />
  <rect x="50" y="70" width="60" height="10" rx="5" fill="#FBCFE8" />
  <rect x="50" y="85" width="40" height="5" rx="2.5" fill="#FBCFE8" />
  
  <rect x="80" y="110" width="80" height="40" rx="20" fill="#FBBF24" />
  <rect x="90" y="120" width="60" height="10" rx="5" fill="#FEF3C7" />
  <rect x="90" y="135" width="40" height="5" rx="2.5" fill="#FEF3C7" />
  
  <rect x="40" y="160" width="80" height="30" rx="15" fill="#34D399" />
  <rect x="50" y="170" width="60" height="10" rx="5" fill="#A7F3D0" />
  
  <!-- People circles -->
  <circle cx="30" cy="80" r="15" fill="#F472B6" />
  <circle cx="170" cy="130" r="15" fill="#FBBF24" />
  <circle cx="30" cy="175" r="15" fill="#34D399" />
  
  <!-- Connection lines -->
  <line x1="45" y1="80" x2="60" y2="80" stroke="#F472B6" stroke-width="2" />
  <line x1="155" y1="130" x2="140" y2="130" stroke="#FBBF24" stroke-width="2" />
  <line x1="45" y1="175" x2="60" y2="175" stroke="#34D399" stroke-width="2" />
  
  <!-- Notification badges -->
  <circle cx="170" cy="50" r="10" fill="#EF4444" />
  <text x="170" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3</text>
</svg> 